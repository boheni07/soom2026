<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeLog — G-001 보호자 대시보드</title>
  <style>
    :root{--indigo:#4A5FC1;--indigo-dk:#344594;--indigo-deep:#2A356E;--sky:#5B8DEF;--sky-light:#8BB4F7;--purple:#8B7EC8;--coral:#E8645A;--lime:#A8D342;--n900:#1A1B2E;--n800:#2D2F4E;--n700:#3D4271;--n600:#5C5F82;--n500:#7C80A6;--n400:#9295AD;--n300:#B5B8CC;--n200:#D4D6E5;--n100:#EBECF3;--n50:#F5F6FA;--white:#FFF;--r8:8px;--r10:10px;--r16:16px;--shadow-s:0 1px 3px rgba(42,90,152,.08);--shadow-m:0 2px 8px rgba(42,90,152,.1);--font:'Inter','Noto Sans KR',sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font);background:var(--n50);color:var(--n800);min-height:100vh}
    .top-bar{background:var(--indigo-deep);color:#fff;padding:12px 20px;display:flex;align-items:center;position:sticky;top:0;z-index:100}.top-bar a{color:#fff;text-decoration:none;font-size:14px}.top-bar .logo{font-weight:700;font-size:18px;margin-right:20px}.top-bar .back-btn{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 12px;border-radius:var(--r8);font-size:13px;cursor:pointer;font-family:var(--font)}.badge{background:var(--indigo);color:#fff;padding:4px 10px;border-radius:999px;font-size:11px;margin-left:auto;font-weight:600}
    .page-content{padding:20px;max-width:1200px;margin:0 auto}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--r8);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:opacity .2s}.btn-primary{background:var(--indigo);color:#fff}.btn-primary:hover{opacity:.9}.btn-ghost{background:transparent;border:1px solid var(--n300);color:var(--n700)}.btn-sm{padding:6px 12px;font-size:12px}
    .card{background:#fff;border-radius:var(--r10);padding:16px;box-shadow:var(--shadow-s);margin-bottom:12px}
    .flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-8{gap:8px}.gap-12{gap:12px}
    .text-sm{font-size:12px}.text-xs{font-size:11px}.text-muted{color:var(--n500)}.text-muted2{color:var(--n600)}
    .badge-sm{display:inline-block;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:600}
    .badge-sm-lime{background:rgba(168,211,66,.15);color:#5A8F2A}.badge-sm-indigo{background:rgba(74,95,193,.1);color:var(--indigo)}.badge-sm-coral{background:rgba(232,100,90,.1);color:var(--coral)}.badge-sm-purple{background:rgba(139,126,200,.1);color:var(--purple)}
  </style>
</head>
<body>
  <div class="top-bar"><a class="logo">LifeLog</a><a class="back-btn" href="../index.html">← 인덱스로</a><span class="badge">G-001</span></div>
  <div class="page-content">

    <div style="margin-bottom:24px;">
      <h2 style="font-size:18px;font-weight:700;">안녕하세요, 사랑님! 👋</h2>
      <p class="text-muted" style="font-size:14px;margin-top:4px;">김사랑 님의 생애 기록 관리 대시보드입니다</p>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;">
      <div class="card" style="border-left:4px solid var(--indigo);"><div class="text-sm text-muted">총 기록</div><div style="font-size:28px;font-weight:700;margin:4px 0;">156</div><div class="text-xs text-muted">누적 기록 건수</div></div>
      <div class="card" style="border-left:4px solid var(--sky);"><div class="text-sm text-muted">활성</div><div style="font-size:28px;font-weight:700;margin:4px 0;">42</div><div class="text-xs text-muted">현재 진행중</div></div>
      <div class="card" style="border-left:4px solid var(--coral);"><div class="text-sm text-muted">리마인더</div><div style="font-size:28px;font-weight:700;margin:4px 0;">5</div><div class="text-xs text-muted">기대한 작업</div></div>
      <div class="card" style="border-left:4px solid var(--purple);"><div class="text-sm text-muted">승인 대기</div><div style="font-size:28px;font-weight:700;margin:4px 0;">3</div><div class="text-xs text-muted">프로필 승인 필요</div></div>
    </div>

    <div class="flex items-center justify-between" style="margin-bottom:12px;"><h3 style="font-size:15px;font-weight:700;">가족 구성원</h3><a href="G-002.html" style="font-size:13px;color:var(--indigo);text-decoration:none;">전체보기 →</a></div>
    <div class="card" style="display:flex;align-items:center;gap:12px;">
      <div style="width:48px;height:48px;background:linear-gradient(135deg,var(--indigo),var(--sky));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;">김</div>
      <div style="flex:1;"><div style="font-size:15px;font-weight:700;">김사랑 (당사자)</div><div class="text-xs text-muted">2008.05.15 · 교육/취업기</div></div>
      <div><span class="badge-sm badge-sm-lime">활성</span></div>
    </div>
    <div class="card" style="display:flex;align-items:center;gap:12px;">
      <div style="width:48px;height:48px;background:linear-gradient(135deg,var(--sky),var(--purple));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;">김</div>
      <div style="flex:1;"><div style="font-size:15px;font-weight:700;">김민수 (배우자)</div><div class="text-xs text-muted">2006.03.22 · 성인기</div></div>
      <div><span class="badge-sm badge-sm-indigo">준비중</span></div>
    </div>
    <div class="card" style="display:flex;align-items:center;gap:12px;">
      <div style="width:48px;height:48px;background:linear-gradient(135deg,var(--lime),#6AAF10);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;">김</div>
      <div style="flex:1;"><div style="font-size:15px;font-weight:700;">김사랑이 (손녀)</div><div class="text-xs text-muted">2018.11.01 · 유아기</div></div>
      <div><span class="badge-sm badge-sm-indigo">준비중</span></div>
    </div>

    <div class="flex items-center justify-between" style="margin:24px 0 12px;"><h3 style="font-size:15px;font-weight:700;">빠른 액션</h3></div>
    <div style="display:flex;gap:12px;">
      <a href="G-001.html" class="btn btn-primary" style="flex:1;justify-content:center;">📝 기록 작성</a>
      <a href="G-005.html" class="btn btn-ghost" style="flex:1;justify-content:center;">📄 PDF</a>
      <a href="S-004.html" class="btn btn-ghost" style="flex:1;justify-content:center;">📨 초대</a>
    </div>
  </div>
</body>
</html>
