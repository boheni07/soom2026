<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeLog — G-005 공유/내보내기</title>
  <style>
    :root{--indigo:#4A5FC1;--indigo-dk:#344594;--indigo-deep:#2A356E;--sky:#5B8DEF;--sky-light:#8BB4F7;--purple:#8B7EC8;--coral:#E8645A;--lime:#A8D342;--n900:#1A1B2E;--n800:#2D2F4E;--n700:#3D4271;--n600:#5C5F82;--n500:#7C80A6;--n400:#9295AD;--n300:#B5B8CC;--n200:#D4D6E5;--n100:#EBECF3;--n50:#F5F6FA;--white:#FFF;--r8:8px;--r10:10px;--r16:16px;--shadow-s:0 1px 3px rgba(42,90,152,.08);--shadow-m:0 2px 8px rgba(42,90,152,.1);--font:'Inter','Noto Sans KR',sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font);background:var(--n50);color:var(--n800);min-height:100vh}
    .top-bar{background:var(--indigo-deep);color:#fff;padding:12px 20px;display:flex;align-items:center;position:sticky;top:0;z-index:100}.top-bar a{color:#fff;text-decoration:none;font-size:14px}.top-bar .logo{font-weight:700;font-size:18px;margin-right:20px}.top-bar .back-btn{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 12px;border-radius:var(--r8);font-size:13px;cursor:pointer;font-family:var(--font)}.badge{background:var(--indigo);color:#fff;padding:4px 10px;border-radius:999px;font-size:11px;margin-left:auto;font-weight:600}
    .page-content{padding:20px;max-width:1200px;margin:0 auto}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--r8);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:opacity .2s}.btn-primary{background:var(--indigo);color:#fff}.btn-ghost{background:transparent;border:1px solid var(--n300);color:var(--n700)}.btn-sm{padding:6px 12px;font-size:12px}
    .input{width:100%;padding:10px 12px;border:1px solid var(--n200);border-radius:var(--r8);font-size:14px;font-family:var(--font);background:#fff}
    .form-group{margin-bottom:12px}.form-label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--n700)}
    .text-sm{font-size:12px}.text-xs{font-size:11px}.text-muted{color:var(--n500)}
    .card{background:#fff;border-radius:var(--r10);padding:16px;box-shadow:var(--shadow-s);margin-bottom:12px}
    .flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-12{gap:12px}
    .progress-bar{width:100%;height:6px;background:var(--n200);border-radius:999px;overflow:hidden}
    .progress-bar-fill{height:100%;border-radius:999px;background:var(--indigo)}
  </style>
</head>
<body>
  <div class="top-bar"><a class="logo">LifeLog</a><a class="back-btn" href="../index.html">← 인덱스로</a><span class="badge">G-005</span></div>
  <div class="page-content">
    <h2 style="font-size:18px;font-weight:700;margin-bottom:24px;">공유 / 내보내기</h2>

    <div style="max-width:640px;margin:0 auto;">
      <div class="card">
        <h3 style="font-size:15px;font-weight:700;margin-bottom:16px;">📁 공유 범위 선택</h3>
        <div class="form-group">
          <label class="form-label">공유할 기록</label>
          <select class="input"><option>김사랑 — 전체 기록 (156건)</option><option>김사랑 — 건강 분야 (42건)</option><option>김사랑 — 교육 분야 (38건)</option><option>김사랑 — 특정 일련 (10건)</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">기간</label>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"><input class="input" type="date" value="2025-01-01"><input class="input" type="date" value="2026-01-15"></div>
        </div>
        <div class="form-group"><label class="form-label">공유 대상</label><div style="display:flex;flex-wrap:wrap;gap:8px;"><label style="font-size:13px;display:flex;align-items:center;gap:4px;padding:6px 12px;background:var(--n50);border-radius:var(--r8);"><input type="checkbox" checked> 👨‍👩‍👧 가족</label><label style="font-size:13px;display:flex;align-items:center;gap:4px;padding:6px 12px;background:var(--n50);border-radius:var(--r8);"><input type="checkbox" checked> 🏢 박지민 (사회복지사)</label><label style="font-size:13px;display:flex;align-items:center;gap:4px;padding:6px 12px;background:var(--n50);border-radius:var(--r8);"><input type="checkbox" checked> 📚 정수진 (특수교사)</label><label style="font-size:13px;display:flex;align-items:center;gap:4px;padding:6px 12px;background:var(--n50);border-radius:var(--r8);"><input type="checkbox" checked> 🤝 최유나 (돌봄도우미)</label></div></div>
        <button class="btn btn-primary" style="margin-top:8px;">📄 PDF 생성 & 다운로드</button>
      </div>

      <div class="card">
        <h3 style="font-size:15px;font-weight:700;margin-bottom:12px;">📊 생성 진행률</h3>
        <div class="progress-bar" style="margin-bottom:8px;"><div class="progress-bar-fill" style="width:100%;"></div></div>
        <div class="flex justify-between text-xs" style="display:flex;justify-content:space-between;font-size:11px;"><span class="text-muted">100% 완료 (10/10페이지)</span><span class="text-muted">2분 30초 소요</span></div>
      </div>

      <div class="card" style="border:2px solid var(--lime);">
        <div style="font-size:14px;font-weight:700;margin-bottom:8px;">✅ 생성 완료!</div>
        <p class="text-xs text-muted" style="font-size:12px;margin-bottom:12px;">LifeLog_김사랑_20250101-20260115.pdf (4.2MB)</p>
        <div class="flex gap-12" style="display:flex;gap:12px;">
          <a href="#" class="btn btn-primary btn-sm" style="flex:1;justify-content:center;">📥 다운로드</a>
          <a href="#" class="btn btn-ghost btn-sm" style="flex:1;justify-content:center;">🔗 공유 링크 복사</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
