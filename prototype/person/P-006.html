<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeLog — P-006 이지 모드 토글</title>
  <style>
    :root{--indigo:#4A5FC1;--indigo-dk:#344594;--indigo-deep:#2A356E;--sky:#5B8DEF;--sky-light:#8BB4F7;--purple:#8B7EC8;--coral:#E8645A;--lime:#A8D342;--n900:#1A1B2E;--n800:#2D2F4E;--n700:#3D4271;--n600:#5C5F82;--n500:#7C80A6;--n400:#9295AD;--n300:#B5B8CC;--n200:#D4D6E5;--n100:#EBECF3;--n50:#F5F6FA;--white:#FFF;--r8:8px;--r10:10px;--r16:16px;--shadow-s:0 1px 3px rgba(42,90,152,.08);--shadow-m:0 2px 8px rgba(42,90,152,.1);--font:'Inter','Noto Sans KR',sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font);background:var(--n50);color:var(--n800);min-height:100vh}
    .top-bar{background:var(--indigo-deep);color:#fff;padding:12px 20px;display:flex;align-items:center;position:sticky;top:0;z-index:100}.top-bar a{color:#fff;text-decoration:none;font-size:14px}.top-bar .logo{font-weight:700;font-size:18px;margin-right:20px}.top-bar .back-btn{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 12px;border-radius:var(--r8);font-size:13px;cursor:pointer;font-family:var(--font)}.badge{background:var(--indigo);color:#fff;padding:4px 10px;border-radius:999px;font-size:11px;margin-left:auto;font-weight:600}
    .page-content{padding:20px;max-width:1200px;margin:0 auto}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--r8);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:opacity .2s}.btn-primary{background:var(--indigo);color:#fff}.btn-ghost{background:transparent;border:1px solid var(--n300);color:var(--n700);}.btn-sm{padding:6px 12px;font-size:12px}
    .card{background:#fff;border-radius:var(--r10);padding:16px;box-shadow:var(--shadow-s);margin-bottom:12px}
    .flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-8{gap:8px}.gap-12{gap:12px}
    .form-group{margin-bottom:12px}.form-label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--n700)}
    .text-muted{color:var(--n500)}
  </style>
</head>
<body>
  <div class="top-bar"><a class="logo">LifeLog</a><a class="back-btn" href="../index.html">← 인덱스로</a><span class="badge">P-006</span></div>
  <div class="page-content">
    <h2 style="font-size:18px;font-weight:700;margin-bottom:20px;">이지 모드 설정</h2>

    <div class="card">
      <div class="flex justify-between items-center" style="flex-wrap:wrap;"><h3 style="font-size:15px;font-weight:700;">이지 모드</h3><label style="display:flex;align-items:center;gap:12px;cursor:pointer;"><span class="text-sm text-muted">사용 중</span><div style="width:52px;height:28px;background:var(--indigo);border-radius:999px;position:relative;padding:2px;"><div style="width:24px;height:24px;background:#fff;border-radius:50%;position:absolute;right:2px;top:2px;box-shadow:var(--shadow-s);"></div></div></label></div>
      <p class="text-muted" style="font-size:13px;margin-top:8px;">글자 크기를 크게, 버튼을 크게, 단순한 레이아웃으로 표시합니다.</p>
    </div>

    <div class="card">
      <div class="form-group"><label class="form-label" style="display:flex;justify-content:space-between;"><span>글자 크기</span><span style="color:var(--indigo);font-weight:700;">20px</span></label><input type="range" min="16" max="24" value="20" style="width:100%;accent-color:var(--indigo);"></div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--n500);margin-top:4px;"><span>16px (작은 글자)</span><span>24px (큰 글자)</span></div>
    </div>

    <div class="card">
      <div class="form-group"><label class="form-label">터치 타겟 크기</label><div style="display:flex;gap:8px;flex-wrap:wrap;"><label style="padding:12px 20px;background:var(--n50);border:2px solid var(--n200);border-radius:var(--r8);cursor:pointer;font-size:14px;">표준<small style="display:block;font-size:11px;color:var(--n500);">12px</small></label><label style="padding:12px 20px;background:rgba(74,95,193,.05);border:2px solid var(--indigo);border-radius:var(--r8);cursor:pointer;font-size:14px;font-weight:600;">중간<small style="display:block;font-size:11px;color:var(--n500);">16px</small></label><label style="padding:12px 20px;background:var(--n50);border:2px solid var(--n200);border-radius:var(--r8);cursor:pointer;font-size:14px;">대화<small style="display:block;font-size:11px;color:var(--n500);">20px</small></label></div></div>
    </div>

    <div class="card">
      <label class="form-label" style="display:flex;justify-content:space-between;"><span>테마</span><span style="color:var(--indigo);font-weight:600;">라이트</span></label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;"><label style="padding:12px 20px;background:var(--n50);border:2px solid var(--n200);border-radius:var(--r8);cursor:pointer;font-size:14px;display:flex;align-items:center;gap:6px;">🌙 다크</label><label style="padding:12px 20px;background:rgba(74,95,193,.05);border:2px solid var(--indigo);border-radius:var(--r8);cursor:pointer;font-size:14px;display:flex;align-items:center;gap:6px;">☀️ 라이트</label><label style="padding:12px 20px;background:var(--n50);border:2px solid var(--n200);border-radius:var(--r8);cursor:pointer;font-size:14px;display:flex;align-items:center;gap:6px;">🔶 고대비</label></div>
    </div>

    <div style="margin-top:20px;"><button class="btn btn-primary">설정 저장하기</button></div>
  </div>
</body>
</html>
