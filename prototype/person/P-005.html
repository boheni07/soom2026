<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeLog — P-005 당사자 알림</title>
  <style>
    :root{--indigo:#4A5FC1;--indigo-dk:#344594;--indigo-deep:#2A356E;--sky:#5B8DEF;--sky-light:#8BB4F7;--purple:#8B7EC8;--coral:#E8645A;--lime:#A8D342;--n900:#1A1B2E;--n800:#2D2F4E;--n700:#3D4271;--n600:#5C5F82;--n500:#7C80A6;--n400:#9295AD;--n300:#B5B8CC;--n200:#D4D6E5;--n100:#EBECF3;--n50:#F5F6FA;--white:#FFF;--r8:8px;--r10:10px;--r12:12px;--r16:16px;--shadow-s:0 1px 3px rgba(42,90,152,.08);--shadow-l:0 4px 16px rgba(42,90,152,.12);--font:'Inter','Noto Sans KR',sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font);background:var(--n50);color:var(--n800);min-height:100vh}
    .top-bar{background:var(--indigo-deep);color:#fff;padding:12px 20px;display:flex;align-items:center;position:sticky;top:0;z-index:100}.top-bar a{color:#fff;text-decoration:none;font-size:14px}.top-bar .logo{font-weight:700;font-size:18px;margin-right:20px}.top-bar .back-btn{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 12px;border-radius:var(--r8);font-size:13px;cursor:pointer;font-family:var(--font)}.badge{background:var(--indigo);color:#fff;padding:4px 10px;border-radius:999px;font-size:11px;margin-left:auto;font-weight:600}
    .page-content{padding:20px;max-width:1200px;margin:0 auto}
    .flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-8{gap:8px}.gap-12{gap:12px}
    .card{background:#fff;border-radius:var(--r10);padding:16px;box-shadow:var(--shadow-s);margin-bottom:12px}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--r8);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:opacity .2s}.btn-primary{background:var(--indigo);color:#fff}.btn-ghost{background:transparent;border:1px solid var(--n300);color:var(--n700);}.btn-sm{padding:6px 12px;font-size:12px}
    .text-sm{font-size:12px}.text-xs{font-size:11px}.text-muted{color:var(--n500)}
  </style>
</head>
<body>
  <div class="top-bar"><a class="logo">LifeLog</a><a class="back-btn" href="../index.html">← 인덱스로</a><span class="badge">P-005</span></div>
  <div class="page-content">
    <div class="flex items-center justify-between" style="margin-bottom:20px;"><h2 style="font-size:18px;font-weight:700;">알림 🔔</h2><button class="btn btn-ghost btn-sm">모두 읽음</button></div>

    <div class="flex flex-col gap-12" style="display:flex;flex-direction:column;gap:12px;">
      <div class="card" style="border-left:4px solid var(--lime);">
        <div class="flex justify-between items-center" style="display:flex;justify-content:space-between;align-items:center;">
          <div class="flex items-center gap-8" style="display:flex;align-items:center;gap:8px;"><span style="font-size:24px;">📝</span><div><div style="font-size:15px;font-weight:600;">새로운 기록이 추가되었어요!</div><p class="text-xs text-muted" style="font-size:12px;margin-top:2px;">최유나 님이 "주간보호센터 이용 일지"를 작성했어요</p></div></div>
          <span class="text-xs text-muted">10분 전</span>
        </div>
      </div>
      <div class="card" style="border-left:4px solid var(--sky);">
        <div class="flex justify-between items-center" style="display:flex;justify-content:space-between;align-items:center;">
          <div class="flex items-center gap-8" style="display:flex;align-items:center;gap:8px;"><span style="font-size:24px;">📅</span><div><div style="font-size:15px;font-weight:600;">내일 약속이 있어요!</div><p class="text-xs text-muted" style="font-size:12px;margin-top:2px;">10:00 진달래병원 정기검진 — 어머님과 함께가요</p></div></div>
          <span class="text-xs text-muted">1시간 전</span>
        </div>
      </div>
      <div class="card" style="border-left:4px solid var(--indigo);">
        <div class="flex justify-between items-center" style="display:flex;justify-content:space-between;align-items:center;">
          <div class="flex items-center gap-8" style="display:flex;align-items:center;gap:8px;"><span style="font-size:24px;">📨</span><div><div style="font-size:15px;font-weight:600;">초대가 수락되었어요!</div><p class="text-xs text-muted" style="font-size:12px;margin-top:2px;">최유나 님이 돌봄도우미로 참여해요</p></div></div>
          <span class="text-xs text-muted">2시간 전</span>
        </div>
      </div>
      <div class="card" style="border-left:4px solid var(--purple);">
        <div class="flex justify-between items-center" style="display:flex;justify-content:space-between;align-items:center;">
          <div class="flex items-center gap-8" style="display:flex;align-items:center;gap:8px;"><span style="font-size:24px;">🎯</span><div><div style="font-size:15px;font-weight:600;">목표 72% 달성! 거의 다 왔어요!</div><p class="text-xs text-muted" style="font-size:12px;margin-top:2px;">자존 감각 향상 목표에 좋아요!</p></div></div>
          <span class="text-xs text-muted">1일 전</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
