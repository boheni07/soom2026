<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeLog — P-002 당사자 기록 열람</title>
  <style>
    :root{--indigo:#4A5FC1;--indigo-dk:#344594;--indigo-deep:#2A356E;--sky:#5B8DEF;--sky-light:#8BB4F7;--purple:#8B7EC8;--coral:#E8645A;--lime:#A8D342;--n900:#1A1B2E;--n800:#2D2F4E;--n700:#3D4271;--n600:#5C5F82;--n500:#7C80A6;--n400:#9295AD;--n300:#B5B8CC;--n200:#D4D6E5;--n100:#EBECF3;--n50:#F5F6FA;--white:#FFF;--r8:8px;--r10:10px;--r16:16px;--r24:24px;--shadow-s:0 1px 3px rgba(42,90,152,.08);--shadow-l:0 4px 16px rgba(42,90,152,.12);--font:'Inter','Noto Sans KR',sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font);background:var(--n50);color:var(--n800);min-height:100vh;font-size:18px}
    .top-bar{background:var(--indigo-deep);color:#fff;padding:12px 20px;display:flex;align-items:center;position:sticky;top:0;z-index:100}.top-bar a{color:#fff;text-decoration:none;font-size:16px}.top-bar .logo{font-weight:700;font-size:20px;margin-right:20px}.top-bar .back-btn{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:8px 16px;border-radius:var(--r10);font-size:16px;cursor:pointer;font-family:var(--font)}.badge{background:var(--lime);color:var(--n900);padding:4px 12px;border-radius:999px;font-size:13px;margin-left:auto;font-weight:700}
    .page-content{padding:20px;max-width:600px;margin:0 auto;padding-bottom:80px}
    .card{background:#fff;border-radius:var(--r16);padding:20px;box-shadow:var(--shadow-s);margin-bottom:12px}
    .flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-8{gap:8px}.gap-12{gap:12px}
    .text-sm{font-size:14px}.text-xs{font-size:12px}.text-muted{color:var(--n500)}
    .badge-sm{display:inline-block;padding:4px 12px;border-radius:999px;font-size:13px;font-weight:600}
    .badge-sm-indigo{background:rgba(74,95,193,.1);color:var(--indigo)}.badge-sm-purple{background:rgba(139,126,200,.1);color:var(--purple)}.badge-sm-coral{background:rgba(232,100,90,.1);color:var(--coral)}.badge-sm-lime{background:rgba(168,211,66,.2);color:#4A7310}
    .input{width:100%;padding:12px 12px;border:1px solid var(--n200);border-radius:var(--r10);font-size:16px;font-family:var(--font);background:#fff}
    .select{appearance:none;box-shadow:none}
  </style>
</head>
<body>
  <div class="top-bar"><a class="logo">LifeLog</a><a class="back-btn" href="../index.html">← 인덱스로</a><span class="badge">이지 모드 ON</span></div>
  <div class="page-content">
    <h2 style="font-size:22px;font-weight:700;margin-bottom:20px;">나의 기록 📝</h2>

    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <select class="input" style="width:auto;padding:12px 32px 12px 12px;box-shadow:none;" class="select"><option>전체 작성자 · 156건</option><option>김사랑 (보호자)</option><option>정수진 (특수교사)</option><option>최유나 (돌봄도우미)</option><option selected>나 (당사자)</option><option>박지민 (사회복지사)</option></select>
    </div>

    <div class="flex flex-col gap-8" style="display:flex;flex-direction:column;gap:8px;">
      <div class="card" style="border-left:4px solid var(--lime);"><div class="text-sm" style="font-size:17px;font-weight:600;">😊 오늘의 기분 — 좋았어요!</div><div class="text-xs text-muted" style="margin-top:4px;font-size:14px;">2026.01.15 · 나를 작성했어요</div></div>
      <div class="card" style="border-left:4px solid var(--n200);"><div class="text-sm" style="font-size:17px;font-weight:600;">밥 먹기 🍚 친구와 점심 먹었어요!</div><div class="text-xs text-muted" style="margin-top:4px;font-size:14px;">2026.01.14 · 나를 작성했어요</div></div>
      <div class="card" style="border-left:4px solid var(--n200);"><div class="text-sm" style="font-size:17px;font-weight:600;">운동하기 🏃 공원 달리기</div><div class="text-xs text-muted" style="margin-top:4px;font-size:14px;">2026.01.13 · 나를 작성했어요</div></div>
      <div class="card" style="border-left:4px solid var(--sky);"><div class="text-sm" style="font-size:17px;font-weight:600;">🎨 미술 수업 — 풍경 그리기</div><div class="text-xs text-muted" style="margin-top:4px;font-size:14px;">2026.01.12 · 정수진老师</div></div>
      <div class="card" style="border-left:4px solid var(--indigo);"><div class="text-sm" style="font-size:17px;font-weight:600;">🏥 건강 검진 — 잘했어요!</div><div class="text-xs text-muted" style="margin-top:4px;font-size:14px;">2026.01.10 · 어머니가 써주셨어요</div></div>
    </div>
  </div>
</body>
</html>
