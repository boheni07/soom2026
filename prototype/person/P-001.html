<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeLog — P-001 당사자 대시보드 (Easy Mode)</title>
  <style>
    :root{--indigo:#4A5FC1;--indigo-dk:#344594;--indigo-deep:#2A356E;--sky:#5B8DEF;--sky-light:#8BB4F7;--purple:#8B7EC8;--coral:#E8645A;--lime:#A8D342;--n900:#1A1B2E;--n800:#2D2F4E;--n700:#3D4271;--n600:#5C5F82;--n500:#7C80A6;--n400:#9295AD;--n300:#B5B8CC;--n200:#D4D6E5;--n100:#EBECF3;--n50:#F5F6FA;--white:#FFF;--r8:8px;--r10:10px;--r16:16px;--r24:24px;--shadow-s:0 1px 3px rgba(42,90,152,.08);--shadow-l:0 4px 16px rgba(42,90,152,.12);--font:'Inter','Noto Sans KR',sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font);background:var(--n50);color:var(--n800);min-height:100vh;font-size:18px}
    .top-bar{background:var(--indigo-deep);color:#fff;padding:12px 20px;display:flex;align-items:center;position:sticky;top:0;z-index:100}.top-bar a{color:#fff;text-decoration:none;font-size:16px}.top-bar .logo{font-weight:700;font-size:20px;margin-right:20px}.top-bar .back-btn{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:8px 16px;border-radius:var(--r10);font-size:16px;cursor:pointer;font-family:var(--font)}.badge{background:var(--lime);color:var(--n900);padding:4px 12px;border-radius:999px;font-size:13px;margin-left:auto;font-weight:700}
    .page-content{padding:20px;max-width:600px;margin:0 auto;padding-bottom:80px}
    .card{background:#fff;border-radius:var(--r16);padding:24px;box-shadow:var(--shadow-s);margin-bottom:16px}
    .flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-8{gap:8px}.gap-12{gap:12px}
    .text-sm{font-size:14px}.text-xs{font-size:12px}.text-muted{color:var(--n500)}
    .badge-sm{display:inline-block;padding:4px 12px;border-radius:999px;font-size:13px;font-weight:600}
    .badge-sm-lime{background:rgba(168,211,66,.2);color:#4A7310}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:12px 24px;border:none;border-radius:var(--r12);font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font);transition:opacity .2s}.btn-primary{background:var(--indigo);color:#fff}.btn-primary:hover{opacity:.9}
    .btn-lg{padding:16px 32px;font-size:20px}
    .bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--n200);display:flex;padding:8px 0;z-index:100}
    .bottom-bar a{text-align:center;padding:8px 20px;font-size:14px;color:var(--n600);text-decoration:none;flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}.bottom-bar a.active{color:var(--indigo);font-weight:700;}.bottom-bar a span{font-size:24px;}
  </style>
</head>
<body>
  <div class="top-bar"><a class="logo">LifeLog</a><a class="back-btn" href="../index.html">← 인덱스로</a><span class="badge">이지 모드 ON</span></div>
  <div class="page-content">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;">
      <div style="width:64px;height:64px;background:linear-gradient(135deg,var(--indigo),var(--sky));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff;flex-shrink:0;">김</div>
      <div><h1 style="font-size:28px;font-weight:700;">안녕, 사랑님! 👋</h1><p class="text-sm text-muted" style="font-size:16px;">오늘도 좋은 하루 보내세요</p></div>
    </div>

    <div class="card" style="border-left:4px solid var(--indigo);">
      <div class="flex justify-between items-center" style="display:flex;justify-content:space-between;align-items:center;">
        <div><h3 style="font-size:20px;font-weight:700;">📝 최근 기록</h3><p class="text-xs text-muted" style="font-size:14px;margin-top:4px;">오늘 작성된 최신 기록이 여기에 표시됩니다</p></div>
        <a href="P-003.html" class="btn btn-primary btn-sm" style="flex-shrink:0;">+ 새 기록</a>
      </div>
      <div style="margin-top:16px;padding:16px;background:var(--n50);border-radius:var(--r10);"><div class="text-sm" style="font-size:16px;font-weight:600;">오늘의 기분 — 좋았어요! 😊</div><div class="text-xs text-muted" style="margin-top:4px;font-size:14px;">2026.01.15 · 자기주도</div></div>
    </div>

    <div class="card" style="border-left:4px solid var(--coral);">
      <div class="flex justify-between items-center" style="display:flex;justify-content:space-between;align-items:center;">
        <div><h3 style="font-size:20px;font-weight:700;">📅 다음 일정</h3><p class="text-xs text-muted" style="font-size:14px;margin-top:4px;">예정된 약속과 기록들이 여기에 표시됩니다</p></div>
      </div>
      <div style="margin-top:16px;padding:16px;background:var(--n50);border-radius:var(--r10);"><div class="text-sm" style="font-size:16px;font-weight:600;">🏥 진달래병원 정기검진</div><div class="text-xs text-muted" style="margin-top:4px;font-size:14px;">내일 10:00 · 어머니와 함께 가요!</div></div>
    </div>
  </div>

  <div class="bottom-bar">
    <a href="P-001.html" class="active"><span>🏠</span>홈</a>
    <a href="P-001.html"><span>📝</span>기록</a>
    <a href="P-004.html"><span>🎯</span>목표</a>
    <a href="P-004.html"><span>👤</span>프로필</a>
  </div>
</body>
</html>
