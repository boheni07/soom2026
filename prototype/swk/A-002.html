<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeLog — A-002 일일 기록</title>
  <style>
    :root{--indigo:#4A5FC1;--indigo-dk:#344594;--indigo-deep:#2A356E;--sky:#5B8DEF;--sky-light:#8BB4F7;--purple:#8B7EC8;--coral:#E8645A;--lime:#A8D342;--n900:#1A1B2E;--n800:#2D2F4E;--n700:#3D4271;--n600:#5C5F82;--n500:#7C80A6;--n400:#9295AD;--n300:#B5B8CC;--n200:#D4D6E5;--n100:#EBECF3;--n50:#F5F6FA;--white:#FFF;--r8:8px;--r10:10px;--r16:16px;--shadow-s:0 1px 3px rgba(42,90,152,.08);--shadow-m:0 2px 8px rgba(42,90,152,.1);--font:'Inter','Noto Sans KR',sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font);background:var(--n50);color:var(--n800);min-height:100vh}
    .top-bar{background:var(--indigo-deep);color:#fff;padding:12px 20px;display:flex;align-items:center;position:sticky;top:0;z-index:100}.top-bar a{color:#fff;text-decoration:none;font-size:14px}.top-bar .logo{font-weight:700;font-size:18px;margin-right:20px}.top-bar .back-btn{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 12px;border-radius:var(--r8);font-size:13px;cursor:pointer;font-family:var(--font)}.badge{background:var(--indigo);color:#fff;padding:4px 10px;border-radius:999px;font-size:11px;margin-left:auto;font-weight:600}
    .page-content{padding:20px;max-width:1200px;margin:0 auto}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--r8);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:opacity .2s}.btn-primary{background:var(--indigo);color:#fff}.btn-ghost{background:transparent;border:1px solid var(--n300);color:var(--n700);}.btn-sm{padding:6px 12px;font-size:12px}
    .card{background:#fff;border-radius:var(--r10);padding:16px;box-shadow:var(--shadow-s);margin-bottom:12px}
    .input{width:100%;padding:10px 12px;border:1px solid var(--n200);border-radius:var(--r8);font-size:14px;font-family:var(--font);background:#fff;transition:all .2s}
    .input:focus{outline:none;border-color:var(--indigo);box-shadow:0 0 0 3px rgba(74,95,193,.1)}
    .textarea{min-height:80px;resize:vertical}
    .form-group{margin-bottom:12px}
    .form-label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--n700)}
    .flex{display:flex}.flex-cols{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-12{gap:12px}
    .text-xs{font-size:11px}.text-sm{font-size:12px}.text-muted{color:var(--n500)}
  </style>
</head>
<body>
  <div class="top-bar"><a class="logo">LifeLog</a><a class="back-btn" href="../index.html">← 인덱스로</a><span class="badge">A-002</span></div>
  <div class="page-content">
    <h2 style="font-size:18px;font-weight:700;margin-bottom:8px;">일일 기록</h2>
    <p class="text-muted" style="font-size:14px;margin-bottom:20px;">2026.01.15 · 돌봄도우미 최유나</p>
    <div style="max-width:640px;"><div class="card"><div class="form-group"><label class="form-label">지원 대상</label><select class="input"><option>김사랑 (주간보호센터)</option></select></div></div><div class="card"><h3 style="font-size:15px;font-weight:700;margin-bottom:12px;">📝 활동 내용</h3>
      <div class="form-group"><label class="form-label">🚶 이동</label><textarea class="input textarea" placeholder="등원/하원 상황, 이동 중 활동 기록">09:00 어머니와 함께 센터 도착. 밝은 표정으로 인사. 09:30 센터에서 가벼운 스트레칭 활동。</textarea></div>
      <div class="form-group"><label class="form-label">🍚 식사</label><textarea class="input textarea">아침: 죽, 김치, 우유 (모두 섭취 완료) 점심: 잡곡밥, 찌개, 샐러드 (밥 반그릇 남김)</textarea></div>
      <div class="form-group"><label class="form-label">🧼 개인위생</label><textarea class="input textarea">손 씻기 잘 함. 화장실 자발적으로 사용. 이 닦기는 도움 필요。</textarea></div>
      <div class="form-group"><label class="form-label">🎨 취미/여가</label><textarea class="input textarea">오후 1시 미술 수업 — 파스텔로 풍경화 그리기. 산과 바다를그림. "엄마에게 보여드리고 싶어요"라고 말함。</textarea></div>
      <div class="form-group"><label class="form-label">📝 특이사항</label><textarea class="input textarea">오전 중에 잠시 우울감 표시 (친구와 놀이 후). 10분 대화를 통해 기분 전환 확인. 이영희 선생님(언어치료사)과 상담 필요。</textarea></div>
      <div class="form-group"><label class="form-label">📷 사진 업로드</label><div style="border:2px dashed var(--n200);border-radius:var(--r8);padding:30px;text-align:center;cursor:pointer;">여기를 클릭하여 사진을 업로드하세요 (최대 10장)</div></div></div></div>
  </div>
</body>
</html>
