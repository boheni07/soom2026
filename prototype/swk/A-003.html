<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeLog — A-003 주간 요약</title>
  <style>
    :root{--indigo:#4A5FC1;--indigo-dk:#344594;--indigo-deep:#2A356E;--sky:#5B8DEF;--sky-light:#8BB4F7;--purple:#8B7EC8;--coral:#E8645A;--lime:#A8D342;--n900:#1A1B2E;--n800:#2D2F4E;--n700:#3D4271;--n600:#5C5F82;--n500:#7C80A6;--n400:#9295AD;--n300:#B5B8CC;--n200:#D4D6E5;--n100:#EBECF3;--n50:#F5F6FA;--white:#FFF;--r8:8px;--r10:10px;--r16:16px;--shadow-s:0 1px 3px rgba(42,90,152,.08);--shadow-m:0 2px 8px rgba(42,90,152,.1);--font:'Inter','Noto Sans KR',sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font);background:var(--n50);color:var(--n800);min-height:100vh}
    .top-bar{background:var(--indigo-deep);color:#fff;padding:12px 20px;display:flex;align-items:center;position:sticky;top:0;z-index:100}.top-bar a{color:#fff;text-decoration:none;font-size:14px}.top-bar .logo{font-weight:700;font-size:18px;margin-right:20px}.top-bar .back-btn{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 12px;border-radius:var(--r8);font-size:13px;cursor:pointer;font-family:var(--font)}.badge{background:var(--indigo);color:#fff;padding:4px 10px;border-radius:999px;font-size:11px;margin-left:auto;font-weight:600}
    .page-content{padding:20px;max-width:1200px;margin:0 auto}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--r8);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:opacity .2s}.btn-primary{background:var(--indigo);color:#fff}.btn-ghost{background:transparent;border:1px solid var(--n300);color:var(--n700);}.btn-sm{padding:6px 12px;font-size:12px}
    .card{background:#fff;border-radius:var(--r10);padding:16px;box-shadow:var(--shadow-s);margin-bottom:12px}
    .flex{display:flex}.flex-cols{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-8{gap:8px}.gap-12{gap:12px}
    .text-xs{font-size:11px}.text-sm{font-size:12px}.text-muted{color:var(--n500)}
    .progress-bar{width:100%;height:8px;background:var(--n200);border-radius:999px;overflow:hidden}.progress-bar-fill{height:100%;border-radius:999px}
  </style>
</head>
<body>
  <div class="top-bar"><a class="logo">LifeLog</a><a class="back-btn" href="../index.html">← 인덱스로</a><span class="badge">A-003</span></div>
  <div class="page-content">
    <div class="flex items-center justify-between" style="margin-bottom:20px;"><h2 style="font-size:18px;font-weight:700;">주간 요약</h2><select style="padding:8px 12px;border:1px solid var(--n200);border-radius:var(--r8);font-size:14px;font-family:var(--font);"><option>2026.01.12 — 2026.01.18 (1월 2주차)</option></select></div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;"><div class="card" style="border-left:4px solid var(--indigo);"><div class="text-sm text-muted">총 일수</div><div style="font-size:28px;font-weight:700;margin:4px 0;">4</div><div class="text-xs text-muted">월~목 (4일)</div></div><div class="card" style="border-left:4px solid var(--sky);"><div class="text-sm text-muted">총 지원 시간</div><div style="font-size:28px;font-weight:700;margin:4px 0;">28h</div><div class="text-xs text-muted">주당 평균 7시간</div></div><div class="card" style="border-left:4px solid var(--lime);"><div class="text-sm text-muted">활동 이벤트</div><div style="font-size:28px;font-weight:700;margin:4px 0;">32</div><div class="text-xs text-muted">총 기록 항목</div></div><div class="card" style="border-left:4px solid var(--coral);"><div class="text-sm text-muted">만족도</div><div style="font-size:28px;font-weight:700;margin:4px 0;">4.2</div><div class="text-xs text-muted">5점 만점</div></div></div>
    <div class="card"><h3 style="font-size:15px;font-weight:700;margin-bottom:16px;">일별 활동</h3>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;"><div><div style="font-size:13px;font-weight:600;margin-bottom:8px;">월 (1/12)</div><div style="font-size:12px;margin-bottom:4px;">6 이벤트 · 식사 2회 · 이동 2회 · 위생 2회</div><div class="progress-bar"><div class="progress-bar-fill" style="width:80%;background:var(--indigo);"></div></div></div><div><div style="font-size:13px;font-weight:600;margin-bottom:8px;">화 (1/13)</div><div style="font-size:12px;margin-bottom:4px;">8 이벤트 · 미술수업 포함</div><div class="progress-bar"><div class="progress-bar-fill" style="width:90%;background:var(--sky);"></div></div></div><div><div style="font-size:13px;font-weight:600;margin-bottom:8px;">수 (1/14)</div><div style="font-size:12px;margin-bottom:4px;">7 이벤트 · 언어치료 포함</div><div class="progress-bar"><div class="progress-bar-fill" style="width:75%;background:var(--lime);"></div></div></div><div><div style="font-size:13px;font-weight:600;margin-bottom:8px;">목 (1/15)</div><div style="font-size:12px;margin-bottom:4px;">11 이벤트 · 현재 진행중</div><div class="progress-bar"><div class="progress-bar-fill" style="width:60%;background:var(--coral);"></div></div></div></div></div>
  </div>
</body>
</html>
