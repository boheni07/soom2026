<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeLog — A-004 선호 리스트</title>
  <style>
    :root{--indigo:#4A5FC1;--indigo-dk:#344594;--indigo-deep:#2A356E;--sky:#5B8DEF;--sky-light:#8BB4F7;--purple:#8B7EC8;--coral:#E8645A;--lime:#A8D342;--n900:#1A1B2E;--n800:#2D2F4E;--n700:#3D4271;--n600:#5C5F82;--n500:#7C80A6;--n400:#9295AD;--n300:#B5B8CC;--n200:#D4D6E5;--n100:#EBECF3;--n50:#F5F6FA;--white:#FFF;--r8:8px;--r10:10px;--r12:12px;--r16:16px;--shadow-s:0 1px 3px rgba(42,90,152,.08);--shadow-m:0 2px 8px rgba(42,90,152,.1);--font:'Inter','Noto Sans KR',sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font);background:var(--n50);color:var(--n800);min-height:100vh}
    .top-bar{background:var(--indigo-deep);color:#fff;padding:12px 20px;display:flex;align-items:center;position:sticky;top:0;z-index:100}.top-bar a{color:#fff;text-decoration:none;font-size:14px}.top-bar .logo{font-weight:700;font-size:18px;margin-right:20px}.top-bar .back-btn{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 12px;border-radius:var(--r8);font-size:13px;cursor:pointer;font-family:var(--font)}.badge{background:var(--indigo);color:#fff;padding:4px 10px;border-radius:999px;font-size:11px;margin-left:auto;font-weight:600}
    .page-content{padding:20px;max-width:1200px;margin:0 auto}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--r8);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:opacity .2s}.btn-primary{background:var(--indigo);color:#fff}.btn-ghost{background:transparent;border:1px solid var(--n300);color:var(--n700);}.btn-sm{padding:6px 12px;font-size:12px}
    .card{background:#fff;border-radius:var(--r10);padding:16px;box-shadow:var(--shadow-s);margin-bottom:12px}
    .flex{display:flex}.flex-cols{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-12{gap:12px}
    .text-xs{font-size:11px}.text-sm{font-size:12px}.text-muted{color:var(--n500)}
    .badge-sm{display:inline-block;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:600}
  </style>
</head>
<body>
  <div class="top-bar"><a class="logo">LifeLog</a><a class="back-btn" href="../index.html">← 인덱스로</a><span class="badge">A-004</span></div>
  <div class="page-content">
    <div class="flex items-center justify-between" style="margin-bottom:20px;"><h2 style="font-size:18px;font-weight:700;">선호 리스트</h2><span class="text-sm text-muted">김사랑 님의 선호 항목</span></div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;"><div class="card"><div class="flex justify-between items-center" style="display:flex;justify-content:space-between;align-items:center;"><h4 style="font-size:14px;font-weight:600;">🎨 좋아하는 것</h4><span class="badge-sm" style="background:rgba(139,126,200,.1);color:var(--purple);">취미</span></h4><div style="margin-top:8px;"><div style="display:flex;flex-wrap:wrap;gap:8px;"><span style="padding:4px 12px;background:var(--n50);border-radius:999px;font-size:12px;">🖌️ 그림 그리기</span><span style="padding:4px 12px;background:var(--n50);border-radius:999px;font-size:12px;">🎵 노래 부르기</span><span style="padding:4px 12px;background:var(--n50);border-radius:999px;font-size:12px;">📸 사진 보기</span></div></div></div></div><div class="card"><div class="flex justify-between items-center" style="display:flex;justify-content:space-between;align-items:center;"><h4 style="font-size:14px;font-weight:600;">🍚 좋아하는 음식</h4><span class="badge-sm" style="background:rgba(232,100,90,.1);color:var(--coral);">식단</span></h4><div style="margin-top:8px;"><div style="display:flex;flex-wrap:wrap;gap:8px;"><span style="padding:4px 12px;background:var(--n50);border-radius:999px;font-size:12px;">🍚 김치밥</span><span style="padding:4px 12px;background:var(--n50);border-radius:999px;font-size:12px;">🥛 우유</span><span style="padding:4px 12px;background:var(--n50);border-radius:999px;font-size:12px;">🍎 사과</span></div></div></div></div><div class="card"><div class="flex justify-between items-center" style="display:flex;justify-content:space-between;align-items:center;"><h4 style="font-size:14px;font-weight:600;">⚠️ 싫어하는 것</h4><span class="badge-sm" style="background:rgba(232,100,90,.1);color:var(--coral);">주의</span></h4><div style="margin-top:8px;"><div style="display:flex;flex-wrap:wrap;gap:8px;"><span style="padding:4px 12px;background:rgba(232,100,90,.05);border-radius:999px;font-size:12px;">🌶️ 매운 맛</span><span style="padding:4px 12px;background:rgba(232,100,90,.05);border-radius:999px;font-size:12px;">🔊 큰 소리</span></div></div></div></div><div class="card"><div class="flex justify-between items-center" style="display:flex;justify-content:space-between;align-items:center;"><h4 style="font-size:14px;font-weight:600;">🏃 활동 선호</h4><span class="badge-sm" style="background:rgba(168,211,66,.15);color:#5A8F2A;">활동</span></h4><div style="margin-top:8px;"><div style="display:flex;flex-wrap:wrap;gap:8px;"><span style="padding:4px 12px;background:var(--n50);border-radius:999px;font-size:12px;">🌳 산책</span><span style="padding:4px 12px;background:var(--n50);border-radius:999px;font-size:12px;">🧘 스트레칭</span><span style="padding:4px 12px;background:var(--n50);border-radius:999px;font-size:12px;">🎯 간단한 운동</span></div></div></div></div></div>
    <p class="text-xs text-muted" style="margin-top:16px;font-size:11px;">마지막 업데이트: 2026.01.15 · 돌봄도우미 최유나</p>
  </div>
</body>
</html>
