<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeLog — T-003 IEP 보호자 공유</title>
  <style>
    :root{--indigo:#4A5FC1;--indigo-dk:#344594;--indigo-deep:#2A356E;--sky:#5B8DEF;--sky-light:#8BB4F7;--purple:#8B7EC8;--coral:#E8645A;--lime:#A8D342;--n900:#1A1B2E;--n800:#2D2F4E;--n700:#3D4271;--n600:#5C5F82;--n500:#7C80A6;--n400:#9295AD;--n300:#B5B8CC;--n200:#D4D6E5;--n100:#EBECF3;--n50:#F5F6FA;--white:#FFF;--r8:8px;--r10:10px;--r16:16px;--shadow-s:0 1px 3px rgba(42,90,152,.08);--shadow-m:0 2px 8px rgba(42,90,152,.1);--font:'Inter','Noto Sans KR',sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font);background:var(--n50);color:var(--n800);min-height:100vh}
    .top-bar{background:var(--indigo-deep);color:#fff;padding:12px 20px;display:flex;align-items:center;position:sticky;top:0;z-index:100}.top-bar a{color:#fff;text-decoration:none;font-size:14px}.top-bar .logo{font-weight:700;font-size:18px;margin-right:20px}.top-bar .back-btn{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 12px;border-radius:var(--r8);font-size:13px;cursor:pointer;font-family:var(--font)}.badge{background:var(--indigo);color:#fff;padding:4px 10px;border-radius:999px;font-size:11px;margin-left:auto;font-weight:600}
    .page-content{padding:20px;max-width:1200px;margin:0 auto}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--r8);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:opacity .2s}.btn-primary{background:var(--indigo);color:#fff}.btn-ghost{background:transparent;border:1px solid var(--n300);color:var(--n700);}.btn-sm{padding:6px 12px;font-size:12px}
    .card{background:#fff;border-radius:var(--r10);padding:16px;box-shadow:var(--shadow-s);margin-bottom:12px}
    .flex{display:flex}.flex-cols{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-12{gap:12px}
    .text-xs{font-size:11px}.text-sm{font-size:12px}.text-muted{color:var(--n500)}
  </style>
</head>
<body>
  <div class="top-bar"><a class="logo">LifeLog</a><a class="back-btn" href="../index.html">← 인덱스로</a><span class="badge">T-003</span></div>
  <div class="page-content">
    <h2 style="font-size:18px;font-weight:700;margin-bottom:24px;">IEP 보호자 공유</h2>
    <div style="max-width:560px;">
      <div class="card"><h3 style="font-size:15px;font-weight:700;margin-bottom:12px;">👆 공유할 보호자 선택</h3><div style="display:flex;flex-direction:column;gap:12px;"><label style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--n50);border-radius:var(--r8);cursor:pointer;"><input type="checkbox" checked style="width:18px;height:18px;accent-color:var(--indigo);"><div><div style="font-size:14px;font-weight:600;">김사랑 (보호자)</div><div class="text-xs text-muted">어머니 · active@lifellog.kr</div></div></label><label style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--n50);border-radius:var(--r8);cursor:pointer;"><input type="checkbox" style="width:18px;height:18px;accent-color:var(--indigo);"><div><div style="font-size:14px;font-weight:600;">김민수 (배우자)</div><div class="text-xs text-muted">남편 · 미인증</div></div></label></div></div>
      <div class="card" style="border:2px solid var(--indigo);"><h3 style="font-size:15px;font-weight:700;margin-bottom:12px;">👁️ 공유 미리보기</h3><div style="padding:16px;background:var(--n50);border-radius:var(--r8);"><div class="text-sm" style="font-size:14px;font-weight:600;margin-bottom:8px;">IEP 목표 — 김사랑</div><div style="font-size:13px;line-height:1.6;"><p><strong>장기목표:</strong> 2026.02까지 5문장 이상 자연스럽게 이야기</p><p><strong>하위목표:</strong> 4개 항목</p><p><strong>평가기준:</strong> 월 2회 관찰 기록</p><p style="margin-top:8px;"><span class="text-xs text-muted">공유 범위: 김사랑 (보호자), 박지민 (사회복지사)</span></p></div></div></div>
      <div style="margin-top:16px;display:flex;gap:12px;"><button class="btn btn-primary" style="flex:1;justify-content:center;">✅ 확인 & 공유하기</button><button class="btn btn-ghost" style="flex:1;justify-content:center;">취소</button></div>
    </div>
  </div>
</body>
</html>
